name: Release — Build macOS DMG

# Triggers on any tag that looks like a version: v1.0.0, v0.2.1-beta, etc.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build-macos:
    name: Build DMG (arm64)
    # macos-14 = Apple Silicon (arm64). GitHub no longer offers free Intel runners.
    # Intel Mac users can run the arm64 build transparently via Rosetta 2.
    runs-on: macos-14

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source                                                            #
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Python                                                            #
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ------------------------------------------------------------------ #
      # 3. NDI SDK                                                           #
      #    ndi-python builds from source and requires the NDI SDK headers.  #
      #    We download and install the official Apple pkg silently.         #
      # ------------------------------------------------------------------ #
      - name: Install NDI SDK
        run: |
          curl -fsSL \
            "https://downloads.ndi.tv/SDK/NDI_SDK_Mac/Install_NDI_SDK_v5_Apple.pkg" \
            -o /tmp/ndi_sdk.pkg
          sudo installer -pkg /tmp/ndi_sdk.pkg -target /
          # NDI SDK installs to /Library/NDI SDK for Apple — verify
          ls "/Library/NDI SDK for Apple/" || true

      # ------------------------------------------------------------------ #
      # 4. ndi-python from source                                            #
      #    The PyPI tarball omits the pybind11 git submodule, so we clone   #
      #    the repo with --recurse-submodules and build from source.        #
      # ------------------------------------------------------------------ #
      - name: Install ndi-python from source
        run: |
          git clone --recurse-submodules \
            https://github.com/buresu/ndi-python.git /tmp/ndi-python
          # The pinned pybind11 submodule is too old for modern CMake (< 3.5).
          # Update it to a recent stable tag before building.
          cd /tmp/ndi-python/lib/pybind11
          git fetch --tags
          git checkout v2.13.6
          cd /tmp/ndi-python
          pip install .

      # ------------------------------------------------------------------ #
      # 5. Remaining Python dependencies                                     #
      # ------------------------------------------------------------------ #
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install everything except ndi-python (already built above)
          grep -iv "ndi-python" requirements.txt | pip install -r /dev/stdin
          pip install pyinstaller pillow

      # ------------------------------------------------------------------ #
      # 5. Generate app icon                                                 #
      # ------------------------------------------------------------------ #
      - name: Generate AppIcon.icns
        run: python assets/generate_icon.py

      # ------------------------------------------------------------------ #
      # 6. Build .app bundle with PyInstaller                               #
      # ------------------------------------------------------------------ #
      - name: Build app bundle
        run: |
          pyinstaller better-face-tracking.spec --clean --noconfirm
          echo "--- dist contents ---"
          ls -lh dist/

      # ------------------------------------------------------------------ #
      # 7. Ad-hoc code signing                                              #
      #    Lets users right-click → Open on first launch without needing   #
      #    a paid Developer ID certificate.                                 #
      #                                                                      #
      #    TO ADD REAL SIGNING later:                                        #
      #      1. Add secrets: APPLE_CERTIFICATE (base64 p12),                #
      #                      APPLE_CERTIFICATE_PASSWORD,                     #
      #                      APPLE_TEAM_ID,                                  #
      #                      APPLE_NOTARY_USER,                              #
      #                      APPLE_NOTARY_PASSWORD                           #
      #      2. Replace the codesign line below with:                        #
      #           security import cert.p12 -k build.keychain \              #
      #             -P ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}             #
      #           codesign --deep --force --options runtime \                #
      #             --sign "Developer ID Application: Your Name ($TEAM_ID)"\#
      #             dist/BetterFaceTracking.app                              #
      #      3. After DMG creation, add notarization:                        #
      #           xcrun notarytool submit BetterFaceTracking-*.dmg \         #
      #             --apple-id ${{ secrets.APPLE_NOTARY_USER }} \            #
      #             --password ${{ secrets.APPLE_NOTARY_PASSWORD }} \        #
      #             --team-id ${{ secrets.APPLE_TEAM_ID }} --wait            #
      #           xcrun stapler staple BetterFaceTracking-*.dmg              #
      # ------------------------------------------------------------------ #
      - name: Ad-hoc code sign
        run: |
          codesign --deep --force --sign - dist/BetterFaceTracking.app
          codesign --verify --verbose dist/BetterFaceTracking.app

      # ------------------------------------------------------------------ #
      # 8. Create DMG                                                        #
      # ------------------------------------------------------------------ #
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DMG_NAME="BetterFaceTracking-${TAG}-arm64.dmg"

          create-dmg \
            --volname "Better Face Tracking ${TAG}" \
            --volicon "assets/AppIcon.icns" \
            --window-pos 200 150 \
            --window-size 620 420 \
            --icon-size 120 \
            --icon "BetterFaceTracking.app" 155 185 \
            --hide-extension "BetterFaceTracking.app" \
            --app-drop-link 465 185 \
            --no-internet-enable \
            "${DMG_NAME}" \
            "dist/"

          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
          echo "--- DMG size ---"
          ls -lh "${DMG_NAME}"

      # ------------------------------------------------------------------ #
      # 9. Upload artifact (available even if release step fails)           #
      # ------------------------------------------------------------------ #
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_NAME }}
          retention-days: 30

      # ------------------------------------------------------------------ #
      # 10. Attach to GitHub Release                                         #
      # ------------------------------------------------------------------ #
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Better Face Tracking ${{ github.ref_name }}"
          generate_release_notes: true
          files: ${{ env.DMG_NAME }}
          body: |
            ## Installation

            1. Download **`BetterFaceTracking-${{ github.ref_name }}-arm64.dmg`**
            2. Open the DMG and drag **BetterFaceTracking** to Applications.
            3. **First launch:** right-click the app → **Open** (required once — app is ad-hoc signed, not notarized yet).
            4. Intel Mac users: the arm64 build runs transparently via **Rosetta 2**.

            ## Requirements
            - macOS 12 (Monterey) or later
            - [NDI Runtime](https://ndi.video/download-ndi-sdk/) installed for NDI video input
            - Canon CR-N series PTZ camera on the same network
